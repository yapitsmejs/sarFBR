name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    name: Gate (lint + format + types + tests + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run gate
        run: uv run python scripts/check.py